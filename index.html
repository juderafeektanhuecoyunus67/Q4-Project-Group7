<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q4 Skills Test | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
    <div class="container main-wrapper shadow-lg p-0 bg-white border border-dark border-3 mt-5">
        <header class="p-3 border-bottom border-dark d-flex align-items-center">
            <img src="sparrowskyuniversity.png" alt="Logo" height="80" width="80"; class="me-2"> SPARROW SKY UNIVERSITY
        </header>
        <div class="row g-0 align-items-center" style="min-height: 500px;">
            <div class="col-md-6 text-center p-4">

 <form action="dashboard.html" method="post">

            </div>
            <div class="col-md-6 p-5">
                <div class="login-card border border-dark border-2 rounded-4 p-4 text-center">
                    <h4 class="fw-bold">Welcome back!</h4>
                    <h2 class="fw-bold mb-4">LOGIN</h2>
                    <div id="errorMessage" class="text-danger small mb-2 fw-bold"></div>
                    <form>
                        <input type="text" id="username" class="form-control mb-3 custom-input" placeholder="Email, username, or ID" required>
                        <input type="password" id="password" class="form-control mb-3 custom-input" placeholder="Password" required>
                        <div class="form-check text-start mb-4">
                            <input class="form-check-input" type="checkbox" id="stay">
                            <label class="form-check-label small" for="stay">Stay logged in</label>
                        </div>
                    
                        <div class="d-flex justify-content-between">
                            <button type="reset" class="btn btn-cancel px-4">Cancel</button>
                            <button type="submit" id="loginBtn" class="btn btn-login px-4">Login</button>
                        </div>
                        </form>
                    </form>
                </div>
            </div>
        </div>
    </form>
        <footer class="bg-dark text-white text-center py-1 small">Jude T. Yunus | 9-Sapphire ©2026</footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
